<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trello Chat</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; }
        .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; background: white; }
        .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { background: #e9f0ff; padding: 8px 14px; border-radius: 18px; max-width: 80%; align-self: flex-start; }
        .message.own { background: #0052cc; color: white; align-self: flex-end; }
        .message .author { font-weight: bold; font-size: 12px; margin-bottom: 4px; }
        .message.own .author { color: #e9f0ff; }
        .message .text { font-size: 14px; }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .input-area { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; background: white; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 24px; font-size: 14px; }
        button { background: #0052cc; color: white; border: none; padding: 0 20px; border-radius: 24px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0747a6; }
        .loading { text-align: center; padding: 20px; color: #666; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <div class="messages" id="messages">
            <div class="loading">Caricamento chat...</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Scrivi un messaggio...">
            <button id="sendBtn">Invia</button>
        </div>
    </div>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        // Inizializza il contesto di Trello
        const t = window.TrelloPowerUp.iframe();
        
        let currentUser = null;
        let currentUserName = null;
        let messagesRef = null;

        // Funzione per ottenere i messaggi salvati (versione locale, condivisa solo tra le tue schede)
        function loadMessages() {
            const stored = localStorage.getItem('trello_chat_messages_v3');
            const messagesContainer = document.getElementById('messages');
            if (stored) {
                const messages = JSON.parse(stored);
                messagesContainer.innerHTML = '';
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message';
                    if (msg.userId === currentUser) msgDiv.classList.add('own');
                    msgDiv.innerHTML = `
                        <div class="author">${escapeHtml(msg.userName)}</div><br>
                        <div class="text">${escapeHtml(msg.text)}</div>
                        <div class="time">${msg.time}</div>
                    `;
                    messagesContainer.appendChild(msgDiv);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } else {
                messagesContainer.innerHTML = '<div class="loading">Nessun messaggio. Scrivi il primo!</div>';
            }
        }

        function sendMessage(text) {
            if (!text.trim() || !currentUser) return;
            
            const stored = localStorage.getItem('trello_chat_messages_v3');
            const messages = stored ? JSON.parse(stored) : [];
            messages.push({
                userId: currentUser,
                userName: currentUserName,
                text: text.trim(),
                time: new Date().toLocaleTimeString(),
                timestamp: Date.now()
            });
            localStorage.setItem('trello_chat_messages_v3', JSON.stringify(messages));
            loadMessages();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Inizializzazione: recupera il nome dell'utente Trello
        async function init() {
            try {
                // Ottieni il contesto per avere l'ID del membro
                const context = t.getContext();
                currentUser = context.member;
                
                if (currentUser && currentUser !== 'notLoggedIn') {
                    // Recupera il nome completo dell'utente
                    const member = await t.member('fullName');
                    currentUserName = member.fullName || 'Utente';
                } else {
                    currentUserName = 'Ospite';
                    currentUser = 'guest_' + Date.now();
                }
                
                // Carica i messaggi
                loadMessages();
                
            } catch (err) {
                console.error('Errore init:', err);
                currentUserName = 'Utente';
                currentUser = 'local_' + Date.now();
                loadMessages();
            }
        }

        // Event listeners
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('messageInput');
            sendMessage(input.value);
            input.value = '';
        });

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('sendBtn').click();
        });

        // Avvia
        init();
    </script>
</body>
</html>
