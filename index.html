<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trello Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f5f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-left: 1px solid #ddd;
            box-shadow: -2px 0 10px rgba(0,0,0,0.05);
        }
        .messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            background: #e9f0ff;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
            align-self: flex-start;
            font-size: 14px;
        }
        .message.own {
            background: #0052cc;
            color: white;
            align-self: flex-end;
        }
        .message small {
            display: block;
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            background: white;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 24px;
            font-size: 14px;
        }
        button {
            background: #0052cc;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #0747a6;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Scrivi un messaggio...">
            <button id="sendBtn">Invia</button>
        </div>
    </div>

    <!-- Libreria ufficiale Trello Power-Up -->
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <script>
        // Inizializza il Power-Up
        window.TrelloPowerUp.initialize({
            'show-settings': function(t, options) {
                return t.popup({
                    title: 'Impostazioni chat',
                    url: './settings.html',
                    height: 200
                });
            }
        });

        // --- Gestione della chat (salva i messaggi in localStorage del browser) ---
        // ATTENZIONE: i messaggi sono visibili SOLO a te.
        // Per una chat condivisa con tutti i collaboratori servirebbe un backend (Firebase o simile).
        
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // Carica i messaggi salvati
        function loadMessages() {
            const stored = localStorage.getItem('trello_chat_messages');
            if (stored) {
                const messages = JSON.parse(stored);
                messagesContainer.innerHTML = '';
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message';
                    if (msg.isOwn) msgDiv.classList.add('own');
                    msgDiv.innerHTML = `<div>${msg.text}</div><small>${msg.time}</small>`;
                    messagesContainer.appendChild(msgDiv);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }
        
        // Salva un nuovo messaggio
        function addMessage(text, isOwn = true) {
            const messages = JSON.parse(localStorage.getItem('trello_chat_messages') || '[]');
            messages.push({
                text: text,
                time: new Date().toLocaleTimeString(),
                isOwn: isOwn
            });
            localStorage.setItem('trello_chat_messages', JSON.stringify(messages));
            loadMessages();
        }
        
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) {
                addMessage(text, true);
                messageInput.value = '';
            }
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
        
        loadMessages();
    </script>
</body>
</html>
