<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trello Chat</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; }
        .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 100%; margin: 0 auto; background: white; }
        .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { background: #e9f0ff; padding: 8px 14px; border-radius: 18px; max-width: 80%; align-self: flex-start; }
        .message.own { background: #0052cc; color: white; align-self: flex-end; }
        .message .author { font-weight: bold; font-size: 12px; margin-bottom: 4px; }
        .message.own .author { color: #e9f0ff; }
        .message .text { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
        .reply-link { font-size: 10px; margin-top: 4px; cursor: pointer; opacity: 0.6; }
        .reply-link:hover { opacity: 1; text-decoration: underline; }
        .message.own .reply-link { color: #e9f0ff; }
        .input-area { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; background: white; }
        textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 24px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 40px; max-height: 120px; }
        button { background: #0052cc; color: white; border: none; padding: 0 20px; border-radius: 24px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0747a6; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="loading">Caricamento chat...</div>
        </div>
        <div class="input-area">
            <textarea id="messageInput" placeholder="Scrivi un messaggio... (Shift+Enter per andare a capo)"></textarea>
            <button id="sendBtn">Invia</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- Trello SDK -->
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    
    <script>
        // Configurazione Firebase
        const firebaseConfig = {
              apiKey: "AIzaSyDG-gYo2Z2s8ihpOvY8CkEYUR6XBjr-lss",
              authDomain: "trello-chat-40d3a.firebaseapp.com",
              projectId: "trello-chat-40d3a",
              storageBucket: "trello-chat-40d3a.firebasestorage.app",
              messagingSenderId: "443951501320",
              appId: "1:443951501320:web:edd991499110e552a701bd"
            };

        // Inizializza Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');

        const t = window.TrelloPowerUp.iframe();
        
        let currentUser = null;
        let currentUserName = null;

        function autoResizeTextarea() {
            const textarea = document.getElementById('messageInput');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function loadMessages() {
            messagesRef.on('value', (snapshot) => {
                const messagesContainer = document.getElementById('messages');
                const data = snapshot.val();
                
                if (data) {
                    const messages = Object.entries(data).map(([id, msg]) => ({ id, ...msg })).sort((a, b) => a.timestamp - b.timestamp);
                    messagesContainer.innerHTML = '';
                    messages.forEach(msg => {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'message';
                        if (msg.userId === currentUser) msgDiv.classList.add('own');
                        
                        const date = new Date(msg.timestamp);
                        const months = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];
                        const formattedDate = `${date.getDate().toString().padStart(2,'0')} ${months[date.getMonth()]} ${date.getFullYear().toString().slice(-2)}`;
                        
                        msgDiv.innerHTML = `
                            <div class="author">${escapeHtml(msg.userName)} - ${formattedDate} - ${msg.time}</div>
                            <div class="text">${escapeHtml(msg.text)}</div>
                            <div class="reply-link" data-reply-to="${escapeHtml(msg.userName)}">Rispondi a ${escapeHtml(msg.userName)}</div>
                        `;
                        messagesContainer.appendChild(msgDiv);
                    });
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                } else {
                    messagesContainer.innerHTML = '<div class="loading">Nessun messaggio. Scrivi il primo!</div>';
                }
            });
        }

        function sendMessage(text) {
            if (!text.trim() || !currentUser) return;
            
            messagesRef.push({
                userId: currentUser,
                userName: currentUserName,
                text: text.trim(),
                time: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }),
                timestamp: Date.now()
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function init() {
            try {
                const context = t.getContext();
                currentUser = context.member;
                
                if (currentUser && currentUser !== 'notLoggedIn') {
                    const member = await t.member('fullName');
                    currentUserName = member.fullName || 'Utente';
                } else {
                    currentUserName = 'Ospite';
                    currentUser = 'guest_' + Date.now();
                }
                
                loadMessages();
            } catch (err) {
                console.error('Errore init:', err);
                currentUserName = 'Utente';
                currentUser = 'local_' + Date.now();
                loadMessages();
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('reply-link')) {
                const userName = e.target.getAttribute('data-reply-to');
                const input = document.getElementById('messageInput');
                input.value = `@${userName} `;
                input.focus();
                autoResizeTextarea();
            }
        });

        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('messageInput');
            sendMessage(input.value);
            input.value = '';
            autoResizeTextarea();
        });

        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
        });
        
        textarea.addEventListener('input', autoResizeTextarea);

        init();
        
        // Forza il corretto focus all'interno del modal
        setTimeout(() => textarea.focus(), 500);
    </script>
</body>
</html>
