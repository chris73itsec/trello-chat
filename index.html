<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trello Chat</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; }
        .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; background: white; }
        .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { background: #e9f0ff; padding: 8px 14px; border-radius: 18px; max-width: 80%; align-self: flex-start; }
        .message.own { background: #0052cc; color: white; align-self: flex-end; }
        .message .author { font-weight: bold; font-size: 12px; margin-bottom: 4px; }
        .message.own .author { color: #e9f0ff; }
        .message .text { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
        .reply-link { font-size: 10px; margin-top: 4px; cursor: pointer; opacity: 0.6; }
        .reply-link:hover { opacity: 1; text-decoration: underline; }
        .message.own .reply-link { color: #e9f0ff; }
        .input-area { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; background: white; align-items: flex-end; }
        .message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 24px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            min-height: 40px;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.4;
            cursor: text;
        }
        .message-input:empty:before {
            content: attr(placeholder);
            color: #888;
        }
        button { background: #0052cc; color: white; border: none; padding: 0 20px; border-radius: 24px; cursor: pointer; font-weight: bold; height: 40px; }
        button:hover { background: #0747a6; }
        .loading { text-align: center; padding: 20px; color: #666; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <div class="messages" id="messages">
            <div class="loading">Caricamento chat...</div>
        </div>
        <div class="input-area">
            <div id="messageInput" class="message-input" contenteditable="true" placeholder="Scrivi un messaggio... (Shift+Enter per andare a capo)"></div>
            <button id="sendBtn">Invia</button>
        </div>
    </div>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        const t = window.TrelloPowerUp.iframe();
        
        let currentUser = null;
        let currentUserName = null;

        function getMessageText() {
            const div = document.getElementById('messageInput');
            return div.innerText || '';
        }

        function setMessageText(text) {
            const div = document.getElementById('messageInput');
            div.innerText = text;
        }

        function loadMessages() {
            const stored = localStorage.getItem('trello_chat_messages_v3');
            const messagesContainer = document.getElementById('messages');
            if (stored && JSON.parse(stored).length > 0) {
                const messages = JSON.parse(stored);
                messagesContainer.innerHTML = '';
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message';
                    if (msg.userId === currentUser) msgDiv.classList.add('own');
                    
                    const date = new Date(msg.timestamp);
                    const months = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];
                    const formattedDate = `${date.getDate().toString().padStart(2,'0')} ${months[date.getMonth()]} ${date.getFullYear().toString().slice(-2)}`;
                    
                    msgDiv.innerHTML = `
                        <div class="author">${escapeHtml(msg.userName)} - ${formattedDate} - ${msg.time}</div>
                        <div class="text">${escapeHtml(msg.text)}</div>
                        <div class="reply-link" data-reply-to="${escapeHtml(msg.userName)}">Rispondi a ${escapeHtml(msg.userName)}</div>
                    `;
                    messagesContainer.appendChild(msgDiv);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } else {
                messagesContainer.innerHTML = '<div class="loading">Nessun messaggio. Scrivi il primo!</div>';
            }
        }

        function sendMessage(text) {
            if (!text.trim() || !currentUser) return;
            
            const stored = localStorage.getItem('trello_chat_messages_v3');
            const messages = stored ? JSON.parse(stored) : [];
            messages.push({
                userId: currentUser,
                userName: currentUserName,
                text: text.trim(),
                time: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }),
                timestamp: Date.now()
            });
            localStorage.setItem('trello_chat_messages_v3', JSON.stringify(messages));
            loadMessages();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function init() {
            try {
                const context = t.getContext();
                currentUser = context.member;
                
                if (currentUser && currentUser !== 'notLoggedIn') {
                    const member = await t.member('fullName');
                    currentUserName = member.fullName || 'Utente';
                } else {
                    currentUserName = 'Ospite';
                    currentUser = 'guest_' + Date.now();
                }
                
                loadMessages();
            } catch (err) {
                console.error('Errore init:', err);
                currentUserName = 'Utente';
                currentUser = 'local_' + Date.now();
                loadMessages();
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('reply-link')) {
                const userName = e.target.getAttribute('data-reply-to');
                setMessageText(`@${userName} `);
                document.getElementById('messageInput').focus();
            }
        });

        document.getElementById('sendBtn').addEventListener('click', () => {
            const text = getMessageText();
            sendMessage(text);
            setMessageText('');
        });

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
            // Shift+Enter crea naturalmente un nuovo <br> nel div contenteditable
        });

        init();
    </script>
</body>
</html>
