<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trello Connector</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
    let unreadCount = 0;
    let lastMessageCount = 0;

    function checkNewMessages() {
        const stored = localStorage.getItem('trello_chat_messages_v3');
        if (stored) {
            const messages = JSON.parse(stored);
            if (messages.length > lastMessageCount) {
                unreadCount = messages.length - lastMessageCount;
            }
        }
    }

    window.TrelloPowerUp.initialize({
        'board-buttons': function(t, options) {
            return [{
                icon: {
                    dark: 'https://raw.githubusercontent.com/chris73itsec/trello-chat/refs/heads/main/icona-chat-bianca.png',
                    light: 'https://raw.githubusercontent.com/chris73itsec/trello-chat/refs/heads/main/icona-chat-nera.png'
                },
                text: 'Apri Chat',
                callback: function(t) {
                    lastMessageCount = JSON.parse(localStorage.getItem('trello_chat_messages_v3') || '[]').length;
                    unreadCount = 0;
                    return t.popup({
                        title: 'Chat Bacheca',
                        url: 'https://chris73itsec.github.io/trello-chat/index.html',
                        height: 900,
                        width: 1000
                    });
                }
            }];
        }
    });

    setInterval(() => {
        checkNewMessages();
        if (unreadCount > 0) {
            TrelloPowerUp.updateUnread(unreadCount);
        }
    }, 5000);
</script>
</body>
</html>
